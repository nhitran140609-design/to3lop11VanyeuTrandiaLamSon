<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cảnh 16: Tấn Công Nghệ An</title>
    <style>
        /* --- CẤU HÌNH CƠ BẢN --- */
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'Times New Roman', serif; user-select: none; }
        
        /* Màn hình bắt đầu (để kích hoạt âm thanh) */
        #start-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: black; z-index: 999;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer;
        }
        #start-text {
            color: #ffd700; font-size: 30px; font-weight: bold;
            border: 2px solid #ffd700; padding: 20px;
            animation: pulse 1.5s infinite;
        }

        /* --- PHẦN STYLE CẢNH 16 --- */
        #scene-16 { width: 100%; height: 100%; position: relative; display: none; }

        /* Nền và hiệu ứng mờ */
        #s16-bg {
            width: 100%; height: 100%;
            background-image: url('nguyentraidoithoai.jpg');
            background-size: cover; background-position: center;
            transition: filter 2s ease;
        }
        .blurred { filter: blur(8px) brightness(0.6); }

        /* Tiêu đề */
        #s16-title-group {
            position: absolute; top: 10%; width: 100%; text-align: center; z-index: 10;
            opacity: 0; transition: opacity 2s;
        }
        .main-title { font-size: 45px; font-weight: bold; color: #ffd700; text-shadow: 3px 3px 0 #b22222; margin-bottom: 10px; }
        .sub-title { font-size: 24px; color: #fff; font-style: italic; text-shadow: 1px 1px 2px #000; }

        /* Phong thư bay */
        #letter-icon {
            position: absolute; width: 150px; z-index: 20; cursor: pointer;
            display: none; /* Ẩn lúc đầu */
            animation: floatAround 6s infinite ease-in-out;
        }
        #letter-icon img { width: 100%; filter: drop-shadow(0 0 15px #ffff00); }
        #letter-hint {
            position: absolute; top: 110%; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.8); color: #ffd700; padding: 5px 10px;
            white-space: nowrap; font-weight: bold; border-radius: 5px;
            font-size: 16px;
        }

        /* --- KHUNG THOẠI (KIỂU LÊ LAI/LÊ LỢI) --- */
        .dialogue-box {
            position: absolute; bottom: 5%; left: 50%; transform: translateX(-50%);
            width: 80%; max-width: 1000px; height: 220px;
            background: linear-gradient(to right, #500000, #200000);
            border: 3px solid #ffd700; border-radius: 10px;
            display: none; align-items: center; z-index: 50;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        
        /* Khung ảnh đại diện */
        .avatar-container {
            width: 160px; height: 180px; margin: 0 20px;
            border: 2px solid #ffd700; background: #000;
            flex-shrink: 0; overflow: hidden;
        }
        .avatar-container img { width: 100%; height: 100%; object-fit: cover; }

        /* Nội dung thoại */
        .text-content {
            flex-grow: 1; padding-right: 20px; color: #fff;
            display: flex; flex-direction: column; justify-content: flex-start; height: 80%;
        }
        .char-name {
            color: #00ff00; /* Màu xanh lá cho nổi bật như yêu cầu */
            font-size: 26px; font-weight: bold; margin-bottom: 10px;
            text-transform: uppercase; border-bottom: 1px solid rgba(255,255,255,0.2);
            padding-bottom: 5px;
        }
        .dialogue-text {
            font-size: 20px; line-height: 1.5; font-style: italic;
        }

        /* Kết luận cuối cùng */
        #final-conclusion {
            position: absolute; bottom: 15%; width: 90%; left: 50%; 
            transform: translateX(-50%); text-align: center;
            font-size: 28px; color: #ffd700; font-weight: bold;
            text-shadow: 2px 2px 0 #b22222;
            background: rgba(0,0,0,0.9); padding: 30px;
            border: 4px solid #b22222; display: none; z-index: 100;
        }

        /* Animation */
        @keyframes pulse { 0% { opacity: 0.8; scale: 0.95; } 50% { opacity: 1; scale: 1.05; } 100% { opacity: 0.8; scale: 0.95; } }
        @keyframes floatAround {
            0% { top: 40%; left: 10%; transform: rotate(-10deg); }
            50% { top: 30%; left: 80%; transform: rotate(10deg); }
            100% { top: 40%; left: 10%; transform: rotate(-10deg); }
        }

    </style>
</head>
<body>

    <audio id="bgm-chaos" src="chaos.mp3" loop></audio>
    <audio id="voice-nguyentrai" src="nguyentraithu.mp3"></audio>
    <audio id="sfx-click" src="ui.click.mp3"></audio>

    <div id="start-overlay" onclick="startScene16()">
        <div id="start-text">BẤM VÀO ĐÂY ĐỂ VÀO CẢNH 16</div>
    </div>

    <div id="scene-16">
        <div id="s16-bg"></div>

        <div id="s16-title-group">
            <div class="main-title">THÁNG 5/1425: TẤN CÔNG NGHỆ AN</div>
            <div class="sub-title">Trong khi vây hãm thành Nghệ An...</div>
        </div>

        <div id="letter-icon" onclick="openLetter()">
            <img src="thu.png" alt="Thư">
            <div id="letter-hint">BẤM ĐỂ XEM THƯ</div>
        </div>

        <div id="dialogue-box" class="dialogue-box">
            <div class="avatar-container">
                <img src="nguyentrai.jpg" alt="Nguyễn Trãi"> </div>
            <div class="text-content">
                <div class="char-name">Nguyễn Trãi (Gửi thư khiêu chiến)</div>
                <div id="typing-area" class="dialogue-text"></div>
            </div>
        </div>

        <div id="final-conclusion">
            ⇒ Phương Chính tức giận đùng đùng nhưng vẫn án binh bất động vì sự bao vây dày đặc của ta.
       <br>
    <button class="game-btn" onclick="window.location.href='canh17.html'">
        QUA CẢNH 17: TRẬN TỐT ĐỘNG - CHÚC ĐỘNG >>
    </button>
</div>
        </div>
    </div>

    <script>
        // --- CẤU HÌNH ---
        const typingSpeed = 60; // Tốc độ chạy chữ (càng nhỏ càng nhanh)

        // --- HÀM XỬ LÝ ---
        function playSound(id) {
            const audio = document.getElementById(id);
            if(audio) { audio.currentTime = 0; audio.play().catch(e => console.log(e)); }
        }

        // 1. BẮT ĐẦU CẢNH
        function startScene16() {
            // Ẩn màn hình chờ
            document.getElementById('start-overlay').style.display = 'none';
            document.getElementById('scene-16').style.display = 'block';

            // Phát nhạc nền
            const bgm = document.getElementById('bgm-chaos');
            bgm.volume = 0.5;
            bgm.play();

            // Hiện tiêu đề sau 0.5s
            setTimeout(() => {
                document.getElementById('s16-title-group').style.opacity = '1';
                
                // Sau 2s: Làm mờ nền & Hiện phong thư
                setTimeout(() => {
                    document.getElementById('s16-bg').classList.add('blurred');
                    document.getElementById('letter-icon').style.display = 'block';
                }, 2000);

            }, 500);
        }

        // 2. MỞ THƯ -> HIỆN KHUNG THOẠI
        function openLetter() {
            playSound('sfx-click');
            
            // Ẩn phong thư bay
            document.getElementById('letter-icon').style.display = 'none';

            // Hiện khung thoại
            const box = document.getElementById('dialogue-box');
            box.style.display = 'flex';

            // Phát giọng đọc
            playSound('voice-nguyentrai');

            // Nội dung thư
            const content = "Ngươi từng gửi thư cho ta, cười ta nương náu nơi rừng núi, thập thò như chuột, không dám ra đồng bằng để đánh nhau. Nay quân ta đã đến đây, ngoài thành Nghệ An đều là chiến trường cả. Ngươi nói đây là rừng núi chăng? Ngươi cứ đóng thành như mụ già mãi hay sao? Ta sợ rằng ngươi không tránh khỏi tiếng nhục, hiền như đàn bà khăn yếm vậy.";

            // Hiệu ứng chạy chữ
            let i = 0;
            const target = document.getElementById('typing-area');
            target.innerHTML = "";

            function typeWriter() {
                if (i < content.length) {
                    target.innerHTML += content.charAt(i);
                    i++;
                    setTimeout(typeWriter, typingSpeed);
                } else {
                    // Chạy chữ xong -> Đợi 2s rồi hiện kết luận
                    setTimeout(showConclusion, 2000);
                }
            }
            typeWriter();
        }

        // 3. KẾT THÚC CẢNH
        function showConclusion() {
            // Ẩn khung thoại đi
            document.getElementById('dialogue-box').style.display = 'none';
            
            // Hiện kết luận
            const conclusion = document.getElementById('final-conclusion');
            conclusion.style.display = 'block';
            
            // Dừng nhạc nền (tùy chọn)
            // document.getElementById('bgm-chaos').pause();
        }
    </script>

</body>
</html>
