<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đại Việt Toàn Thắng</title>
    <style>
        /* --- CẤU HÌNH CHUNG --- */
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; font-family: 'Times New Roman', serif; overflow: hidden; user-select: none; }
        
        .game-btn { 
            margin-top: 20px; padding: 15px 40px; font-size: 20px; font-weight: bold;
            color: #ffd700; background: #b22222; border: 2px solid #ffd700; 
            cursor: pointer; border-radius: 8px; transition: 0.3s; 
            box-shadow: 0 0 10px #ff0000;
        }
        .game-btn:hover { background: #ff4500; transform: scale(1.05); }

        /* --- CẢNH 18: LÊN NGÔI --- */
        #scene-18 { width: 100%; height: 100%; position: absolute; top: 0; left: 0; display: block; }
        
        #s18-bg { 
            width: 100%; height: 100%; 
            background-image: url('lenngoi.jpg'); 
            background-size: cover; background-position: center; 
        }

        #s18-content { 
            position: absolute; bottom: 10%; width: 80%; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.9); 
            border: 4px solid #ffd700; 
            padding: 30px; text-align: center; border-radius: 15px; 
            box-shadow: 0 0 50px rgba(255, 215, 0, 0.5); 
            animation: slideUp 1s ease-out;
        }

        .s18-date { 
            font-size: 35px; color: #ffd700; font-weight: 900; margin-bottom: 20px; 
            text-transform: uppercase; text-shadow: 2px 2px 0 #b22222; border-bottom: 1px solid #555; padding-bottom: 10px;
        }

        .s18-text { 
            font-size: 24px; color: #fff; line-height: 1.6; margin-bottom: 30px; min-height: 100px;
        }
        
        /* --- CẢNH 19: VIDEO & KẾT THÚC --- */
        #scene-19 { width: 100%; height: 100%; position: absolute; top: 0; left: 0; display: none; background: black; }
        
        #video-bndc { width: 100%; height: 100%; object-fit: contain; }
        
        #end-game-screen { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); z-index: 100; 
            display: none; flex-direction: column; justify-content: center; align-items: center; 
        }

        .end-title { 
            font-size: 70px; color: #ffd700; text-transform: uppercase; font-weight: 900; 
            margin-bottom: 20px; text-shadow: 0 0 30px #ff0000; animation: zoomIn 1.5s;
        }
        .end-subtitle { font-size: 24px; color: #ccc; margin-bottom: 40px; font-style: italic; }

        /* Animation */
        @keyframes slideUp { from { bottom: -50%; opacity: 0; } to { bottom: 10%; opacity: 1; } }
        @keyframes zoomIn { from { scale: 0; opacity: 0; } to { scale: 1; opacity: 1; } }
    </style>
</head>
<body>

    <audio id="chucmung-sound" src="chucmung.mp3"></audio>
    <audio id="click-sound" src="ui.click.mp3"></audio>
    <div id="scene-18">
        <div id="s18-bg"></div>
        <div id="s18-content">
            <div class="s18-date">15/4/1428 - LÊ LỢI LÊN NGÔI</div>
            <div class="s18-text" id="s18-typewriter"></div>
            <button class="game-btn" onclick="goToScene19()">XEM BÌNH NGÔ ĐẠI CÁO >></button>
        </div>
    </div>

    <div id="scene-19">
        <video id="video-bndc" src="binhngodaicao.mp4"></video>
        <div id="end-game-screen">
            <div class="end-title">ĐẠI VIỆT TOÀN THẮNG</div>
            <div class="end-subtitle">Triều đại Hậu Lê chính thức bắt đầu, mở ra kỷ nguyên độc lập thịnh trị.</div>
            <button class="game-btn" onclick="window.location.href='index.html'">
        KHỞI ĐỘNG LẠI TRÒ CHƠI ↻
    </button>
</div>

    <script>
        // --- HÀM HỖ TRỢ ---
        function playSound(id) { 
            const audio = document.getElementById(id); 
            if(audio) { audio.currentTime = 0; audio.play().catch(e=>{}); } 
        }
        
        function pauseSound(id) {
            const audio = document.getElementById(id); 
            if(audio) audio.pause();
        }

        function typeWriter(text, elementId, speed, callback) {
            let i = 0; const el = document.getElementById(elementId); el.innerHTML = "";
            function type() {
                if (i < text.length) { 
                    // Xử lý xuống dòng
                    if (text.substring(i, i+4) === "<br>") { el.innerHTML += "<br>"; i+=4; }
                    else { el.innerHTML += text.charAt(i); i++; }
                    setTimeout(type, speed); 
                } 
                else { if (callback) callback(); }
            }
            type();
        }

        // --- KHỞI CHẠY CẢNH 18 ---
        window.onload = function() {
            startScene18();
        };

        function startScene18() {
            // Phát nhạc nền chúc mừng
            playSound('chucmung-sound');
            
            // Nội dung chạy chữ
            const content = "Lê Lợi chính thức lên ngôi Hoàng đế, hình thành nhà Hậu Lê.<br>Sau đó, Vua sai Nguyễn Trãi thay lời viết Bình Ngô Đại Cáo để tuyên bố chiến thắng, giành lại độc lập cho Đại Việt.";
            
            typeWriter(content, 's18-typewriter', 40);
        }

        // --- CHUYỂN QUA CẢNH 19 ---
        function goToScene19() {
            playSound('click-sound');
            pauseSound('chucmung-sound'); // Tắt nhạc chúc mừng để nghe tiếng video

            // Ẩn 18, hiện 19
            document.getElementById('scene-18').style.display = 'none';
            document.getElementById('scene-19').style.display = 'block';

            // Xử lý Video
            const video = document.getElementById('video-bndc');
            video.play();
            
            // Nếu có âm thanh bndc.mp3 riêng thì bật ở đây:
            // playSound('bndc-audio');

            // Khi video kết thúc -> Hiện bảng Victory
            video.onended = function() {
                document.getElementById('end-game-screen').style.display = 'flex';
                playSound('chucmung-sound'); // Bật lại nhạc hào hùng
            };
        }
    </script>
</body>
</html>
