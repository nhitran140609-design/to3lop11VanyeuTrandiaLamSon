<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trận Tốt Động - Chúc Động</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Times New Roman', serif;
            user-select: none; /* Ngăn chọn văn bản */
        }

        #game-scene {
            position: relative;
            width: 100vw;
            height: 100vh;
            background-image: url('totdongchucdong.jpg');
            background-size: cover;
            background-position: center;
        }

        /* Tiêu đề và Text chạy chữ */
        #intro-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7); /* Nền mờ để dễ đọc chữ */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            color: #ffd700; /* Màu vàng kim */
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        #scene-title {
            font-size: 4em;
            font-weight: bold;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px #000;
            opacity: 0;
            animation: fadeIn 2s forwards;
        }

        #intro-text {
            font-size: 1.5em;
            line-height: 1.6;
            max-width: 80%;
            color: #fff;
            text-shadow: 1px 1px 2px #000;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Game Elements */
        .soldier {
            position: absolute;
            width: 80px; /* Điều chỉnh kích thước lính */
            height: auto;
            cursor: grab;
            transition: filter 0.3s, transform 0.3s;
            z-index: 10;
        }

        .soldier:hover {
            filter: drop-shadow(0 0 10px #ffd700); /* Sáng lên khi di chuột vào */
            transform: scale(1.1);
        }
        
        .soldier.placed {
             cursor: default;
             filter: none;
             transform: none;
        }

        .enemy {
            position: absolute;
            width: 60px; /* Kích thước giặc nhỏ hơn chút */
            height: auto;
            left: 50%;
            transform: translateX(-50%);
            top: -100px; /* Bắt đầu từ ngoài màn hình phía trên */
            transition: top 10s linear, transform 0.5s ease; /* Di chuyển chậm */
            z-index: 5;
        }

        .marker {
            position: absolute;
            width: 50px;
            height: 50px;
            background-image: url('daux.png');
            background-size: contain;
            background-repeat: no-repeat;
            opacity: 0.7;
            z-index: 1;
            /* Ẩn đi ban đầu, hiện lên khi game bắt đầu */
            display: none; 
        }

        #message-area {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 2em;
            font-weight: bold;
            text-shadow: 2px 2px 4px #000;
            z-index: 50;
            pointer-events: none;
        }

        .success-msg { color: #00ff00; } /* Màu xanh lá */
        .fail-msg { color: #ff0000; } /* Màu đỏ */
        .info-msg { color: #fff; } /* Màu trắng */

        #attack-btn {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 40px;
            font-size: 2em;
            font-weight: bold;
            color: #fff;
            background-color: #b22222; /* Đỏ đậm */
            border: 3px solid #ffd700;
            border-radius: 10px;
            cursor: pointer;
            display: none; /* Ẩn ban đầu */
            z-index: 100;
            box-shadow: 0 0 15px #b22222;
            animation: pulseBtn 1.5s infinite;
        }

        #attack-btn:hover {
            background-color: #ff4500;
            box-shadow: 0 0 25px #ff4500;
        }

        @keyframes pulseBtn {
            0% { transform: translateX(-50%) scale(1); }
            50% { transform: translateX(-50%) scale(1.05); }
            100% { transform: translateX(-50%) scale(1); }
        }

        /* Hiệu ứng giặc ngã */
        .enemy.dead {
            transform: translateX(-50%) rotate(90deg) !important; /* Nghiêng 90 độ */
            filter: grayscale(100%); /* Chuyển sang trắng đen */
        }
    </style>
</head>
<body>

    <div id="game-scene">
        <div id="intro-overlay">
            <div id="scene-title">TRẬN TỐT ĐỘNG - CHÚC ĐỘNG</div>
            <div id="intro-text"></div>
        </div>

        <div id="message-area"></div>

        <button id="attack-btn">TẤN CÔNG!</button>

        </div>

    <script>
        const scene = document.getElementById('game-scene');
        const introOverlay = document.getElementById('intro-overlay');
        const introTextDiv = document.getElementById('intro-text');
        const messageArea = document.getElementById('message-area');
        const attackBtn = document.getElementById('attack-btn');
        // const bgMusic = document.getElementById('bg-music'); // Uncomment nếu dùng nhạc

        // Nội dung chạy chữ
        const introContent = `Sau khi Vương Thông kéo quân đến thành Đông Quan, với số quân áp đảo, Vương Thông cũng chia làm 3 đạo quân đánh Ninh Kiều.<br><br>Biết tin, đạo quân của Đinh Lễ và Nguyễn Xí tiến quân đến Ninh Kiều để hỗ trợ Đỗ Bí và Lý Triện (tổng 1 vạn quân và dân).`;
        
        // Cấu hình game
        const markers = []; // Mảng chứa các dấu X
        const soldiers = []; // Mảng chứa lính
        const enemies = []; // Mảng chứa giặc
        let soldiersPlacedCount = 0; // Đếm số lính đã đặt đúng vị trí

        // Hàm chạy chữ (Typewriter effect)
        function typeWriter(text, element, speed = 50) {
            let i = 0;
            element.innerHTML = '';
            // Xử lý thẻ <br> trong text
            const formattedText = text.replace(/<br>/g, '\n'); 
            
            function type() {
                if (i < text.length) {
                    if (text.substring(i, i+4) === '<br>') {
                        element.innerHTML += '<br>';
                        i += 4;
                    } else {
                        element.innerHTML += text.charAt(i);
                        i++;
                    }
                    setTimeout(type, speed);
                } else {
                    // Sau khi chạy chữ xong, đợi 2s rồi vào game
                    setTimeout(startGame, 2000);
                }
            }
            type();
        }

        // Bắt đầu chạy intro
        window.onload = () => {
             // bgMusic.play(); // Uncomment để phát nhạc
            typeWriter(introContent, introTextDiv, 40);
        };

        // Hàm bắt đầu game
        function startGame() {
            // Ẩn màn hình intro
            introOverlay.style.display = 'none';

            // 1. Hiện lính nghĩa quân ở 2 góc dưới
            spawnSoldiers();

            // 2. Sau 2 giây, giặc xuất hiện và đi xuống
            setTimeout(spawnEnemies, 2000);

            // 3. Hiện các dấu X (Markers)
            spawnMarkers();
        }

        function spawnSoldiers() {
            // 3 lính bên trái (lật ngược 180 độ? Có thể ý bạn là flip ngang? Tôi sẽ flip ngang để hướng về giữa)
            // Theo yêu cầu: "hình ban2 lật ngược 180o" -> transform: scaleX(-1) nếu muốn quay mặt sang phải
            // Góc trái dưới
            for (let i = 0; i < 3; i++) {
                createSoldier('left', 50 + i * 60, window.innerHeight - 150);
            }
            // Góc phải dưới
            for (let i = 0; i < 3; i++) {
                createSoldier('right', window.innerWidth - 120 - i * 60, window.innerHeight - 150);
            }
        }

        function createSoldier(side, x, y) {
            const img = document.createElement('img');
            img.src = 'ban2.png';
            img.classList.add('soldier');
            img.style.left = x + 'px';
            img.style.top = y + 'px';
            
            // Xử lý lật hình
            if (side === 'left') {
                 // Lính bên trái thường quay mặt sang phải để nhìn vào giữa
                 img.style.transform = 'scaleX(-1)'; 
            } else {
                // Lính bên phải quay mặt sang trái
                // img.style.transform = 'scaleX(1)'; // Mặc định
            }

            // Sự kiện kéo thả (Drag and Drop) cơ bản
            img.onmousedown = function(event) {
                if (img.classList.contains('placed')) return; // Đã đặt rồi thì không kéo nữa

                let shiftX = event.clientX - img.getBoundingClientRect().left;
                let shiftY = event.clientY - img.getBoundingClientRect().top;

                img.style.position = 'absolute';
                img.style.zIndex = 1000;

                function moveAt(pageX, pageY) {
                    img.style.left = pageX - shiftX + 'px';
                    img.style.top = pageY - shiftY + 'px';
                }

                moveAt(event.pageX, event.pageY);

                function onMouseMove(event) {
                    moveAt(event.pageX, event.pageY);
                    
                    // Kiểm tra xem đang hover lên marker nào không để hiện thông báo (Optional)
                }

                document.addEventListener('mousemove', onMouseMove);

                img.onmouseup = function() {
                    document.removeEventListener('mousemove', onMouseMove);
                    img.onmouseup = null;

                    // Kiểm tra vị trí thả
                    checkPlacement(img);
                };
            };

            // Ngăn chặn sự kiện drag mặc định của trình duyệt
            img.ondragstart = function() {
                return false;
            };

            scene.appendChild(img);
            soldiers.push(img);
        }

        function spawnMarkers() {
            // Đường đi ở giữa, markers nằm 2 bên đường
            const centerX = window.innerWidth / 2;
            const startY = 150; // Vị trí Y bắt đầu của marker
            const gapY = 150; // Khoảng cách giữa các marker

            // 3 Marker bên trái đường
            for (let i = 0; i < 3; i++) {
                createMarker(centerX - 150, startY + i * gapY);
            }
            // 3 Marker bên phải đường
            for (let i = 0; i < 3; i++) {
                createMarker(centerX + 100, startY + i * gapY);
            }
        }

        function createMarker(x, y) {
            const div = document.createElement('div');
            div.classList.add('marker');
            div.style.left = x + 'px';
            div.style.top = y + 'px';
            div.style.display = 'block'; // Hiện lên
            scene.appendChild(div);
            markers.push({ element: div, occupied: false, x: x, y: y });
        }

        function spawnEnemies() {
            // Tạo 5 tên giặc đi hàng dọc
            for (let i = 0; i < 5; i++) {
                const img = document.createElement('img');
                img.src = 'quangiac.png';
                img.classList.add('enemy');
                // Vị trí xuất phát so le nhau để tạo thành hàng dọc
                img.style.top = (-100 - i * 120) + 'px'; 
                scene.appendChild(img);
                enemies.push(img);

                // Kích hoạt di chuyển
                setTimeout(() => {
                    img.style.top = (window.innerHeight + 100) + 'px'; // Đi hết màn hình
                }, 100);
            }
        }

        function checkPlacement(soldierImg) {
            const soldierRect = soldierImg.getBoundingClientRect();
            let placedCorrectly = false;

            for (let marker of markers) {
                if (marker.occupied) continue;

                const markerRect = marker.element.getBoundingClientRect();
                
                // Kiểm tra va chạm (đơn giản hóa: tâm lính nằm trong vùng marker)
                const soldierCenterX = soldierRect.left + soldierRect.width / 2;
                const soldierCenterY = soldierRect.top + soldierRect.height / 2;

                if (soldierCenterX >= markerRect.left && soldierCenterX <= markerRect.right &&
                    soldierCenterY >= markerRect.top && soldierCenterY <= markerRect.bottom) {
                    
                    // Đặt đúng vị trí
                    soldierImg.style.left = marker.x + 'px';
                    soldierImg.style.top = marker.y + 'px';
                    soldierImg.classList.add('placed'); // Khóa lính lại
                    marker.occupied = true;
                    marker.element.style.display = 'none'; // Ẩn dấu X đi cho đẹp
                    
                    placedCorrectly = true;
                    soldiersPlacedCount++;
                    break;
                }
            }

            if (placedCorrectly) {
                showMessage("Địa hình được tận dụng", "success-msg");
            } else {
                showMessage("Địa hình chưa được tận dụng", "fail-msg");
            }

            // Kiểm tra điều kiện thắng (đủ 6 lính)
            if (soldiersPlacedCount === 6) {
                showAttackButton();
            }
        }

        function showMessage(text, className) {
            messageArea.innerText = text;
            messageArea.className = ""; // Reset class
            messageArea.classList.add(className);
            
            // Ẩn tin nhắn sau 2s
            setTimeout(() => {
                if (messageArea.innerText === text) messageArea.innerText = "";
            }, 2000);
        }

        function showAttackButton() {
            attackBtn.style.display = 'block';
            showMessage("Sẵn sàng tấn công!", "info-msg");
            
            // Dừng quân địch lại (tùy chọn: làm cho chúng đứng yên chờ chết hoặc cứ để đi)
             enemies.forEach(e => {
                const computedStyle = window.getComputedStyle(e);
                const currentTop = computedStyle.top;
                e.style.transition = 'none'; // Tắt transition để dừng ngay lập tức
                e.style.top = currentTop;
            });
        }

        // Sự kiện bấm nút tấn công
        attackBtn.onclick = () => {
            attackBtn.style.display = 'none'; // Ẩn nút sau khi bấm
            
            // Hiệu ứng giặc ngã
            enemies.forEach((enemy, index) => {
                setTimeout(() => {
                    enemy.classList.add('dead');
                    // Ngẫu nhiên nghiêng trái hoặc phải
                    const rotation = Math.random() > 0.5 ? 90 : -90;
                    enemy.style.transform = `translateX(-50%) rotate(${rotation}deg)`;
                }, index * 200); // Ngã lần lượt cho đẹp
            });

            showMessage("Tấn công thành công!", "success-msg");

            // Có thể thêm logic chuyển cảnh tiếp theo ở đây sau vài giây
            setTimeout(() => {
                alert("Chúc mừng! Bạn đã chiến thắng trận Tốt Động - Chúc Động!");
                // window.location.href = 'next_scene.html'; 
            }, 3000);
        };

    </script>
</body>
</html>
